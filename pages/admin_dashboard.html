<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../css/admin_dashboard.css">
</head>
<body>

    <div class="container-fluid" id="navContainer">
        <nav class="navbar navbar-expand-lg">
            <a class="navbar-brand ms-4"><i class="bi bi-file-code"></i>  ProjectFlow</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#adminNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="adminNav">
                <ul class="navbar-nav ms-auto align-items-center gap-3 mt-2">
                    <li class="nav-item me-3" id="assign"><button class="btn btn-light fw-bold" id="assignProject" data-bs-toggle="modal" data-bs-target="#assignModal"><i class="bi bi-plus-circle-fill me-2"></i>Assign Project</button></li>

                    <li class="nav-item me-3">
                        <button class="btn btn-light rounded-pill" id="themeToggle">
                            <i class="bi bi-moon-fill"></i>
                        </button>
                    </li>
                    <li class="nav-item me-3">
                        <button class="btn btn-light rounded-pill" id="myAccount" data-bs-target="#accountCanvas" data-bs-toggle="offcanvas">
                            <i class="bi bi-person-circle"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </nav>
    </div>

    <!-- Assign Project Modal -->
    <div class="modal" id="assignModal" data-bs-backdrop="static">
        <div class="modal-dialog">            
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title">Assign Project </h2><button type="button" class="btn btn-close" data-bs-dismiss="modal"> </button>
                </div>
                <div class="modal-body p-3">

                    <label for="projectName">Project Name<span class="text-danger">*</span></label>
                    <input type="text" id="projectName" class="form-control" required>

                    <label for="projectDescription">Project Description<span class="text-danger">*</span></label>
                    <textarea id="projectDescription" class="form-control" required></textarea>

                    <!-- <label for="startDate">Start Date<span class="text-danger">*</span></label>
                    <input type="date" id="startDate" class="form-control" required> -->

                    <label for="endDate">End Date<span class="text-danger">*</span></label>
                    <input type="date" id="endDate" class="form-control" required>

                    <label for="department">Department<span class="text-danger">*</span></label>
                    <select class="form-select" id="department">
                        <option value=""></option>
                        <option value="Development">Development</option>
                        <option value="FrontEndDevelopment">Front End Development</option>
                        <option value="BackEndDevelopment">Back End Development</option>
                        <option value="FullStackDevelopment">Full Stack Development</option>
                        <option value="UI/UXDesign">UI/UX Design</option>
                        <option value="QualityAssurance">Quality Assurance (QA)</option>
                        <option value="Testing">Testing</option>
                        <option value="DevOps">DevOps</option>
                        <option value="ProjectManagement">Project Management</option>
                        <option value="TechnicalSupport">Technical Support</option>  
                    </select>

                    <label for="employee">Employee ID<span class="text-danger">*</span></label>
                    <select class="form-select" id="employee">
                        <option value="">Select Employee</option>
                    </select>
                    
                    <label for="remarks">Remarks<span class="text-danger">*</span></label>
                    <textarea id="remarks" class="form-control" required></textarea>   
                    <div class="modal-footer justify-content-end">
                        <button type="submit" class="btn btn-purple px-4" id="submitBtn">Assign</button>
                        <button type="button" class="btn btn-purple px-4" data-bs-dismiss="modal">Close</button>
                    </div>                    
                </div>
            </div>
        
        </div>
    </div>

    <div class="offcanvas offcanvas-end" id="accountCanvas">
        <h5 class="offcanvas-header">
           <i class="bi bi-person-circle fs-2 me-2"></i>My Account<button class="btn-close" data-bs-dismiss="offcanvas"></button>
        </h5>
        <div class="offcanvas-body">
            <label class="mt-3"><strong>Fullname :</strong></label><span id="fullname" class="ms-2"></span><br>
            <label class="mt-3"><strong>Email    :</strong></label><span id="email" class="ms-2"></span><br>
            <label class="mt-3"><strong>Date of Join :</strong></label><span id="doj" class="ms-2"></span><br>
            <label class="mt-3"><strong>Department  :</strong></label><span id="departmentAdmin" class="ms-2"></span><br>
            <label class="mt-3"><strong>Designation :</strong></label><span id="designation" class="ms-2"></span><br>

            <button class="btn btn-purple mt-5 w-100" id="logoutBtn">Logout</button>
        </div>
        </div>

        <div class="filter-container mb-4">
        
        <div>
            <label>Project Name</label>
             <input type="text"
            id="searchProject"
            class="form-control"
            placeholder="Search Project">

        </div>
       
        <div>
            <label>Employee ID</label>
            <input type="text"
            id="searchEmployee"
            class="form-control"
            placeholder="Employee ID">

        </div>
        
        <div>
            <label>Status</label>
            <select id="statusFilter" class="form-select">
            <option value="">All Status</option>
            <option value="Not Yet Started">Not Yet Started</option>
            <option value="InProgress">In Progress</option>
            <option value="Completed">Completed</option>
        </select>

        </div>
        
        <div>
            <label class="form-label fw-semibold"> From Date</label>
            <input type="date"  id="fromDate" class="form-control">
        </div>
        
        <div>
            <label class="form-label fw-semibold">  To Date</label>
            <input type="date" id="toDate" class="form-control">
        </div>
        

        <button id="clearFilter" class="btn btn-secondary">
            Clear
        </button>

    </div>
    
    <div class="container mt-5" id="pillsContainer">
        <ul class="nav nav-pills">
            <li class="nav-item"><button class="nav-link mx-2 active" id="projects">
                <i class="bi bi-kanban-fill me-2"></i>Projects<span class="badge bg-dark text-light ms-2" id="projectCount">0</span>
            </button></li>             
            <li class="nav-item"><button class="nav-link mx-2" id="employees">
                <i class="bi bi-person-badge-fill me-2"></i>Employees<span class="badge bg-dark text-light ms-2" id="employeeCount">0</span>
            </button></li>
            <li class="nav-item"><button class="nav-link mx-2" id="completed">
                <i class="bi bi-check-circle-fill me-2"></i>Completed Projects<span class="badge bg-dark text-light ms-2" id="completedCount">0</span>
            </button></li> 
            <li class="nav-item"><button class="nav-link mx-2" id="overdue">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>Overdue Projects<span class="badge bg-dark text-light ms-2" id="overdueCount">0</span>
            </button></li>  
            <li class="nav-item"><button class="nav-link mx-2" id="deleted">
                 <i class="bi bi-trash-fill me-2"></i>Deleted Projects<span class="badge bg-dark text-light ms-2" id="deletedCount">0</span>
            </button></li>                
        </ul>
    </div>

    <div id="taskContainer">
        
    </div>
    <nav class="mt-4">
        <ul id="pagination" class="pagination justify-content-center"></ul>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/admin_dashboard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
</body>
</html>
