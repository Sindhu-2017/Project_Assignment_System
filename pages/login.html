<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="../index.html">
                <i class="bi bi-file-code"></i>  ProjectFlow
            </a>

            <button class="btn btn-light" id="themeToggle">
                <i class="bi bi-moon-stars-fill"></i>
            </button>
        </div>
    </nav>
    <div class="container d-flex justify-content-center align-items-center login-container">
        <div class="card  p-4">
            <h3 class="card-title text-center fw-bold mt-3">Login</h3>
            <div class="card-body">    
                <form id="loginForm">
                    <label for="email" class="mt-3">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person fs-3"></i></span>
                        <input type="text" name="email" class="form-control" id="email">
                        <div class="invalid-feedback">
                            Email Field Should not be empty.
                        </div>
                    </div>
                    
                    <label for="password" class="mt-3">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-file-lock2 fs-3"></i></span>
                        <input type="password" name="password" class="form-control" id="password">
                        <div class="invalid-feedback">
                            Password Field Should not be empty.
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-purple w-100 my-5 fs-5 fw-bold" id="login">Login</button>
                </form>

                <p class="text-center">Dont you have an account ? <a href="signup.html" class="text-decoration-none fs-5 fw-bold" id="signup">Signup</a></p>
            </div>
        </div> 
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>

    <script src="../js/login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
</body>
</html>
