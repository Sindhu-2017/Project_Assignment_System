<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../css/employee_dashboard.css">
</head>
<body>
    <div class="container-fluid" id="navContainer">
        <nav class="navbar navbar-expand-lg">
            <a class="navbar-brand ms-4 fs-4"><i class="bi bi-file-code fs-4"></i>  ProjectFlow</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#adminNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="adminNav">
                <ul class="navbar-nav ms-auto me-3">
                    <li class="nav-item me-3">
                        <button class="btn btn-light rounded-pill" id="themeToggle">
                            <i class="bi bi-moon-fill"></i>
                        </button>
                    </li>
                    <li class="nav-item me-3">
                        <button class="btn btn-light rounded-pill" data-bs-target="#accountCanvas" data-bs-toggle="offcanvas">
                            <i class="bi bi-person-circle"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </nav>
    </div>   

    <div class="offcanvas offcanvas-end" id="accountCanvas">
        <h5 class="offcanvas-header">
           <i class="bi bi-person-circle fs-2 me-2"></i>My Account<button class="btn-close" data-bs-dismiss="offcanvas"></button>
        </h5>
        <hr>
        <div class="offcanvas-body">
            <label class="mt-3"><strong>Fullname :</strong></label><span id="fullname" class="ms-2"></span><br>
            <label class="mt-3"><strong>Email    :</strong></label><span id="email" class="ms-2"></span><br>
            <label class="mt-3"><strong>Date of Join :</strong></label><span id="doj" class="ms-2"></span><br>
            <label class="mt-3"><strong>Department  :</strong></label><span id="department" class="ms-2"></span><br>
            <label class="mt-3"><strong>Designation :</strong></label><span id="designation" class="ms-2"></span><br>

            <button class="btn btn-purple mt-5 w-100" id="logoutBtn">Logout</button>
        </div>
    </div>

    <div class="filter-container">

        <div class="filter-item">
            <label>Project Name</label>
            <div class="input-group">
                <span class="input-group-text">
                    <i class="bi bi-search"></i>
                </span>
                <input type="text" id="searchName" class="form-control" placeholder="Search project">
            </div>
        </div>

        <div class="filter-item">
            <label>From Date</label>
            <input type="date" id="fromDate" class="form-control">
        </div>

        <div class="filter-item">
            <label>To Date</label>
            <input type="date"  id="toDate"  class="form-control">
        </div>

        <button id="clearFilter" class="clear-btn">
            <i class="bi bi-arrow-clockwise"></i>
            Reset
        </button>

    </div>
    <div class="container mt-5" id="pillsContainer">
        <ul class="nav nav-pills">
            <li class="nav-item"><button class="nav-link mx-2 active" id="all">
                All<span class="badge bg-dark text-light ms-2" id="allCount">0</span>
            </button></li>             
            <li class="nav-item"><button class="nav-link mx-2" id="pending">
                In Progress<span class="badge bg-dark text-light ms-2" id="progressCount">0</span>
            </button></li>
            <li class="nav-item"><button class="nav-link mx-2" id="completed">
                Completed<span class="badge bg-dark text-light ms-2" id="completedCount">0</span>
            </button></li>
            <li class="nav-item"><button class="nav-link mx-2" id="notStarted">
                Not Yet Started<span class="badge bg-dark text-light ms-2" id="notStartedCount">0</span>
            </button></li>   
            <li class="nav-item"><button class="nav-link mx-2" id="overdue">
                Overdue<span class="badge bg-dark text-light ms-2" id="overdueCount">0</span>
            </button></li>                
        </ul>
    </div>

    <div id="taskContainer">
        
    </div>
    <nav class="mt-4">
        <ul id="pagination"
            class="pagination justify-content-center">
        </ul>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>

    <script src="../js/employee_dashboard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
</body>
</html>
